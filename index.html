<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Text Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a2332 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideInDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .header h1 {
            font-size: clamp(28px, 8vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

        .input-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        .input-section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        #textInput {
            width: 100%;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 100px;
        }

        #textInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-box {
            margin-top: 16px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .styles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            animation: fadeIn 0.5s ease 0.2s both;
        }

        .style-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }

        .style-card.special {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .style-card.special:hover {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.35);
        }

        .style-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .style-card:hover::before {
            left: 100%;
        }

        .style-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px rgba(99, 102, 241, 0.15);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(99, 102, 241, 0.05) 100%);
        }

        .style-name {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .style-preview {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
            margin-bottom: 16px;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px 8px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: auto;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .copy-btn.copied {
            background: var(--success);
            animation: pulse 0.4s ease;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
        }

        .toast.hide {
            animation: slideOutDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes slideOutDown {
            to {
                opacity: 0;
                transform: translateY(100px);
            }
        }

        @media (max-width: 640px) {
            .styles-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 32px;
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
            }
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>

                        'A': '𝒜', 'B': '𝐵', 'C': '𝒞', 'D': '𝒟', 'E': '𝐸', 'F': '𝒻', 'G': '𝒢', 'H': '𝐻', 'I': '𝐼', 'J': '𝒥',
                        'K': '𝒦', 'L': '𝐿', 'M': '𝑀', 'N': '𝒩', 'O': '𝒪', 'P': '𝒫', 'Q': '𝒬', 'R': '𝑅', 'S': '𝒮', 'T': '𝒯',
                        'U': '𝒰', 'V': '𝒱', 'W': '𝒲', 'X': '𝒳', 'Y': '𝒴', 'Z': '𝒵'
                    };
                    return map[char] || char;
                }).join('')
            },
            {
                name: 'Monospace',
                generator: (text) => text.split('').map(char => {
                    const map = {
                        'a': '𝚊', 'b': '𝚋', 'c': '𝚌', 'd': '𝚍', 'e': '𝚎', 'f': '𝚏', 'g': '𝚐', 'h': '𝚑', 'i': '𝚒', 'j': '𝚓',
                        'k': '𝚔', 'l': '𝚕', 'm': '𝚖', 'n': '𝚗', 'o': '𝚘', 'p': '𝚙', 'q': '𝚚', 'r': '𝚛', 's': '𝚜', 't': '𝚝',
                        'u': '𝚞', 'v': '𝚟', 'w': '𝚠', 'x': '𝚡', 'y': '𝚢', 'z': '𝚣',
                        'A': '𝙰', 'B': '𝙱', 'C': '𝙲', 'D': '𝙳', 'E': '𝙴', 'F': '𝙵', 'G': '𝙶', 'H': '𝙷', 'I': '𝙸', 'J': '𝙹',
                        'K': '𝙺', 'L': '𝙻', 'M': '𝙼', 'N': '𝙽', 'O': '𝙾', 'P': '𝙿', 'Q': '𝚀', 'R': '𝚁', 'S': '𝚂', 'T': '𝚃',
                        'U': '𝚄', 'V': '𝚅', 'W': '𝚆', 'X': '𝚇', 'Y': '𝚈', 'Z': '𝚉',
                        '0': '𝟶', '1': '𝟷', '2': '𝟸', '3': '𝟹', '4': '𝟺', '5': '𝟻', '6': '𝟼', '7': '𝟽', '8': '𝟾', '9': '𝟿'
                    };
                    return map[char] || char;
                }).join('')
            },
            {
                name: 'Superscript',
                generator: (text) => text.split('').map(char => {
                    const map = {
                        'a': 'ᵃ', 'b': 'ᵇ', 'c': 'ᶜ', 'd': 'ᵈ', 'e': 'ᵉ', 'f': 'ᶠ', 'g': 'ᵍ', 'h': 'ʰ', 'i': 'ⁱ', 'j': 'ʲ',
                        'k': 'ᵏ', 'l': 'ˡ', 'm': 'ᵐ', 'n': 'ⁿ', 'o': 'ᵒ', 'p': 'ᵖ', 'q': 'ᵍ', 'r': 'ʳ', 's': 'ˢ', 't': 'ᵗ',
                        'u': 'ᵘ', 'v': 'ᵛ', 'w': 'ʷ', 'x': 'ˣ', 'y': 'ʸ', 'z': 'ᶻ',
                        '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴', '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹',
                        ' ': ' '
                    };
                    return map[char.toLowerCase()] || char;
                }).join('')
            },
            {
                name: 'Subscript',
                generator: (text) => text.split('').map(char => {
                    const map = {
                        'a': 'ₐ', 'e': 'ₑ', 'h': 'ₕ', 'i': 'ᵢ', 'j': 'ⱼ', 'k': 'ₖ', 'l': 'ₗ', 'm': 'ₘ', 'n': 'ₙ',
                        'o': 'ₒ', 'p': 'ₚ', 'r': 'ᵣ', 's': 'ₛ', 't': 'ₜ', 'u': 'ᵤ', 'v': 'ᵥ', 'x': 'ₓ',
                        '0': '₀', '1': '₁', '2': '₂', '3': '₃', '4': '₄', '5': '₅', '6': '₆', '7': '₇', '8': '₈', '9': '₉',
                        ' ': ' '
                    };
                    return map[char.toLowerCase()] || char;
                }).join('')
            },
            {
                name: 'Circled',
                generator: (text) => text.split('').map(char => {
                    const code = char.charCodeAt(0);
                    if (code >= 97 && code <= 122) return String.fromCharCode(code - 97 + 0x24D0);
                    if (code >= 65 && code <= 90) return String.fromCharCode(code - 65 + 0x24B6);
                    return char;
                }).join('')
            },
            {
                name: 'Small Caps',
                generator: (text) => text.split('').map(char => {
                    const map = {
                        'a': 'ᴀ', 'b': 'ʙ', 'c': 'ᴄ', 'd': 'ᴅ', 'e': 'ᴇ', 'f': 'ꜰ', 'g': 'ɢ', 'h': 'ʜ', 'i': 'ɪ', 'j': 'ᴊ',
                        'k': 'ᴋ', 'l': 'ʟ', 'm': 'ᴍ', 'n': 'ɴ', 'o': 'ᴏ', 'p': 'ᴘ', 'q': 'q', 'r': 'ʀ', 's': 'ꜱ', 't': 'ᴛ',
                        'u': 'ᴜ', 'v': 'ᴠ', 'w': 'ᴡ', 'x': 'x', 'y': 'ʏ', 'z': 'ᴢ'
                    };
                    return map[char.toLowerCase()] || char;
                }).join('')
            },
            {
                name: 'Strikethrough',
                generator: (text) => text.split('').map(char => char + '\u0336').join('')
            },
            {
                name: 'Underline',
                generator: (text) => text.split('').map(char => char + '\u0332').join('')
            },
            {
                name: 'Overline',
                generator: (text) => text.split('').map(char => char + '\u0305').join('')
            },
            {
                name: 'Zalgo',
                generator: (text) => {
                    const above = ['̴', '̡', '̢', '̧', '̨', '̛', '̖', '̗', '̘', '̙', '̜', '̝', '̞', '̟', '̠', '̤', '̥', '̦', '̩', '̪', '̫', '̬', '̭', '̮', '̯', '̰', '̱', '̲'];
                    const below = ['̧', '̨', '̩', '̪', '̫', '̬', '̭', '̮', '̯', '̰', '̱', '̲', '̳', '̴', '̵', '̶', '̷', '̸'];
                    return text.split('').map(char => {
                        let result = char;
                        for (let i = 0; i < 3; i++) {
                            result += above[Math.floor(Math.random() * above.length)];
                        }
                        for (let i = 0; i < 3; i++) {
                            result += below[Math.floor(Math.random() * below.length)];
                        }
                        return result;
                    }).join('');
                }
            },
            {
                name: 'Inverted',
                generator: (text) => {
                    const map = {
                        'a': 'ɐ', 'b': 'q', 'c': 'ɔ', 'd': 'p', 'e': 'ǝ', 'f': 'ɟ', 'g': 'ƃ', 'h': 'ɥ', 'i': 'ᴉ', 'j': 'ɾ',
                        'k': 'ʞ', 'l': 'l', 'm': 'ɯ', 'n': 'u', 'o': 'o', 'p': 'd', 'q': 'b', 'r': 'ɹ', 's': 's', 't': 'ʇ',
                        'u': 'n', 'v': 'ʌ', 'w': 'ʍ', 'x': 'x', 'y': 'ʎ', 'z': 'z'
                    };
                    return text.split('').reverse().map(char => map[char.toLowerCase()] || char).join('');
                }
            },
            {
                name: 'Spaced Out',
                generator: (text) => text.split('').join(' ')
            },
            {
                name: 'Dot Separated',
                generator: (text) => text.split('').join('·')
            },
            {
                name: 'Bubbles',
                generator: (text) => text.split('').map(char => {
                    const map = {
                        'a': '🅐', 'b': '🅑', 'c': '🅒', 'd': '🅓', 'e': '🅔', 'f': '🅕', 'g': '🅖', 'h': '🅗', 'i': '🅘', 'j': '🅙',
                        'k': '🅚', 'l': '🅛', 'm': '🅜', 'n': '🅝', 'o': '🅞', 'p': '🅟', 'q': '🅠', 'r': '🅡', 's': '🅢', 't': '🅣',
                        'u': '🅤', 'v': '🅥', 'w': '🅦', 'x': '🅧', 'y': '🅨', 'z': '🅩'
                    };
                    return map[char.toLowerCase()] || char;
                }).join('')
            }
        ];

        // Combine both arrays
        let filteredStyles = [...specialFonts, ...fontStyles];

        function renderStyles() {
            const text = textInput.value.trim();
            
            if (!text) {
                stylesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✍️</div>
                        <p>Start typing to see fancy text variations</p>
                    </div>
                `;
                return;
            }

            const searchTerm = searchInput.value.toLowerCase();
            const stylesToRender = filteredStyles.filter(style => 
                style.name.toLowerCase().includes(searchTerm)
            );

            if (stylesToRender.length === 0) {
                stylesContainer.innerHTML = `
                    <div class="no-results">
                        <p>No styles found. Try a different search!</p>
                    </div>
                `;
                return;
            }

            stylesContainer.innerHTML = stylesToRender.map((style, index) => {
                try {
                    const styledText = style.generator(text);
                    const isSpecial = style.name.includes('SPECIAL');
                    return `
                        <div class="style-card ${isSpecial ? 'special' : ''}" style="animation-delay: ${index * 0.05}s">
                            <div class="style-name">
                                ${style.name}
                                <span style="font-size: 12px; opacity: 0.6;">✓</span>
                            </div>
                            <div class="style-preview">${styledText}</div>
                            <button class="copy-btn" onclick="copyToClipboard('${styledText.replace(/'/g, "\\'")}', this)">
                                Copy
                            </button>
                        </div>
                    `;
                } catch (e) {
                    return `
                        <div class="style-card">
                            <div class="style-name">${style.name}</div>
                            <div class="style-preview">Error</div>
                            <button class="copy-btn" disabled style="opacity: 0.5;">Error</button>
                        </div>
                    `;
                }
            }).join('');
        }

        window.copyToClipboard = function(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.textContent = 'Copied! ✓';
                
                showToast('Copied to clipboard!');
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = 'Copy';
                }, 1500);
            });
        };

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        }

        textInput.addEventListener('input', renderStyles);
        searchInput.addEventListener('input', renderStyles);

        renderStyles();
    </script>
</body>
</html>
